name: Defect Tracker CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify-backend:
    runs-on: ubuntu-latest
    services:
      postgres-test:
        image: postgres:15
        env:
          POSTGRES_DB: defect_tracker_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest psycopg2-binary

    - name: Run Backend Test Suite
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/defect_tracker_test
        TEST_DATABASE_URL: postgresql://test_user:test_password@localhost:5432/defect_tracker_test
      run: |
        cd backend
        pytest

    - name: Lint and check Python syntax
      run: python -m compileall backend/

  verify-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Node.js environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: npm ci

    - name: Run frontend tests
      run: npm test

    - name: Run TypeScript compiler & production build
      run: npm run build
